services:
  - type: web
    name: auralis-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false   # fill in after Vercel deploy
      - key: GROQ_API_KEY
        sync: false   # fill in manually
      - key: YOUTUBE_API_KEY
        sync: false   # fill in manually
      - key: DATABASE_URL
        fromDatabase:
          name: auralis-db
          property: connectionString

databases:
  - name: auralis-db
    databaseName: auralis
    user: auralis
    plan: free
    region: singapore
